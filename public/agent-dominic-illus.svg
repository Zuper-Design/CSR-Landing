<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none">
  <!-- Soft pastel background -->
  <rect width="320" height="400" rx="0" fill="#FFF0E8"/>
  <rect x="20" y="20" width="280" height="360" rx="24" fill="#FFDCC8" opacity="0.5"/>

  <!-- Body / shoulders -->
  <path d="M95 340 C95 290, 110 270, 160 260 C210 270, 225 290, 225 340 L225 400 L95 400 Z" fill="#1a1a1a"/>
  <!-- Shirt collar -->
  <path d="M140 270 L160 290 L180 270" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <ellipse cx="160" cy="258" rx="18" ry="12" fill="#F5D5C0"/>

  <!-- Head -->
  <ellipse cx="160" cy="210" rx="55" ry="60" fill="#F5D5C0"/>

  <!-- Hair - short styled male hair -->
  <path d="M105 200 C105 155, 125 130, 160 125 C195 130, 215 155, 215 200 L215 190 C215 150, 195 120, 160 115 C125 120, 105 150, 105 190 Z" fill="#1a1a1a"/>
  <!-- Hair side left -->
  <path d="M105 195 C103 175, 108 160, 115 155" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Hair side right -->
  <path d="M215 195 C217 175, 212 160, 205 155" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Hair top texture -->
  <path d="M125 140 C140 128, 175 125, 195 140" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Eyebrows -->
  <path d="M132 195 C137 190, 147 190, 152 194" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M168 194 C173 190, 183 190, 188 195" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="142" cy="208" rx="8" ry="8" fill="white"/>
  <ellipse cx="142" cy="208" rx="5" ry="5" fill="#1a1a1a"/>
  <circle cx="140" cy="206" r="2" fill="white"/>

  <ellipse cx="178" cy="208" rx="8" ry="8" fill="white"/>
  <ellipse cx="178" cy="208" rx="5" ry="5" fill="#1a1a1a"/>
  <circle cx="176" cy="206" r="2" fill="white"/>

  <!-- Nose -->
  <path d="M157 218 C158 224, 162 226, 165 224" stroke="#D4A98C" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Smile -->
  <path d="M143 235 C150 243, 170 243, 177 235" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Ear left -->
  <ellipse cx="105" cy="215" rx="8" ry="12" fill="#F5D5C0"/>
  <ellipse cx="105" cy="215" rx="4" ry="7" fill="#E8C4AB"/>

  <!-- Ear right -->
  <ellipse cx="215" cy="215" rx="8" ry="12" fill="#F5D5C0"/>
  <ellipse cx="215" cy="215" rx="4" ry="7" fill="#E8C4AB"/>

  <!-- Headset band -->
  <path d="M100 195 C100 160, 125 135, 160 133 C195 135, 220 160, 220 195" stroke="#555" stroke-width="3.5" fill="none"/>

  <!-- Headset ear left -->
  <rect x="90" y="200" width="16" height="28" rx="6" fill="#555"/>
  <rect x="92" y="204" width="6" height="18" rx="3" fill="#888"/>

  <!-- Headset mic arm -->
  <path d="M96 228 C96 248, 110 260, 130 262" stroke="#555" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Mic -->
  <ellipse cx="132" cy="262" rx="7" ry="5" fill="#555"/>
  <ellipse cx="132" cy="262" rx="4" ry="3" fill="#888"/>

  <!-- Hand gesture - pointing up -->
  <g transform="translate(230, 260)">
    <path d="M0 40 C0 20, 5 5, 10 0 L14 0 C16 5, 16 15, 14 25 L20 10 L24 11 C24 20, 22 30, 18 38 L0 40 Z" fill="#F5D5C0" stroke="#E0B89C" stroke-width="1"/>
  </g>
</svg>