<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none">
  <!-- Soft blue pastel background (like the reference image) -->
  <rect width="320" height="400" fill="#E8F0FA"/>
  <rect x="20" y="20" width="280" height="360" rx="24" fill="#D4E4F7" opacity="0.5"/>

  <!-- Body / shoulders with black top -->
  <path d="M90 340 C90 295, 110 275, 160 262 C210 275, 230 295, 230 340 L230 400 L90 400 Z" fill="#1a1a1a"/>
  <!-- Collar detail -->
  <path d="M134 278 Q160 298 186 278" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- Shoulder highlight -->
  <path d="M98 320 C100 305, 108 290, 120 280" stroke="#fff" stroke-width="1.2" opacity="0.3" fill="none"/>

  <!-- Neck -->
  <ellipse cx="160" cy="258" rx="17" ry="11" fill="#F5D5C0"/>

  <!-- Head -->
  <ellipse cx="160" cy="205" rx="56" ry="62" fill="#F5D5C0"/>

  <!-- Hair - bob cut with bangs (like reference) -->
  <!-- Main hair shape -->
  <path d="M100 215 C98 160, 118 120, 160 115 C202 120, 222 160, 220 215 L222 250 C222 260, 218 268, 210 270 L210 220 C210 220, 210 175, 160 168 C110 175, 110 220, 110 220 L110 270 C102 268, 98 260, 98 250 Z" fill="#1a1a1a"/>
  <!-- Bangs -->
  <path d="M110 175 C115 155, 135 142, 160 140 C180 142, 195 148, 205 162 L200 172 C190 158, 175 152, 160 151 C140 152, 125 160, 118 175 Z" fill="#1a1a1a"/>
  <!-- Bangs texture lines -->
  <path d="M120 170 C128 155, 140 148, 155 147" stroke="#333" stroke-width="1" fill="none"/>
  <path d="M135 168 C142 157, 155 150, 168 150" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Hair side strands -->
  <path d="M100 215 C98 235, 100 255, 108 270" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M220 215 C222 235, 220 255, 212 270" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Glasses (like reference) -->
  <!-- Left lens -->
  <rect x="124" y="196" width="30" height="24" rx="10" stroke="#1a1a1a" stroke-width="2.5" fill="white" fill-opacity="0.3"/>
  <!-- Right lens -->
  <rect x="166" y="196" width="30" height="24" rx="10" stroke="#1a1a1a" stroke-width="2.5" fill="white" fill-opacity="0.3"/>
  <!-- Bridge -->
  <path d="M154 207 C157 204, 163 204, 166 207" stroke="#1a1a1a" stroke-width="2.2" fill="none"/>
  <!-- Temple arms -->
  <path d="M124 205 L112 202" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M196 205 L208 202" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Eyes behind glasses -->
  <ellipse cx="139" cy="209" rx="5" ry="5.5" fill="#1a1a1a"/>
  <circle cx="137.5" cy="207.5" r="1.8" fill="white"/>
  <ellipse cx="181" cy="209" rx="5" ry="5.5" fill="#1a1a1a"/>
  <circle cx="179.5" cy="207.5" r="1.8" fill="white"/>

  <!-- Eyebrows -->
  <path d="M128 192 C133 188, 143 188, 150 191" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M170 191 C177 188, 187 188, 192 192" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <path d="M157 222 C159 226, 163 228, 166 226" stroke="#D4A98C" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- Gentle smile -->
  <path d="M145 237 C152 244, 168 244, 175 237" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Blush -->
  <ellipse cx="128" cy="230" rx="10" ry="5" fill="#FFB8A0" opacity="0.35"/>
  <ellipse cx="192" cy="230" rx="10" ry="5" fill="#FFB8A0" opacity="0.35"/>

  <!-- Hand on chin (like reference) -->
  <g>
    <!-- Arm -->
    <path d="M230 340 C232 320, 225 295, 208 275 C200 266, 190 258, 185 252" stroke="#1a1a1a" stroke-width="16" stroke-linecap="round" fill="none"/>
    <!-- Hand -->
    <path d="M178 248 C175 240, 178 236, 184 234 C190 232, 194 236, 195 242 L196 250 C198 248, 202 247, 204 250 C206 253, 204 258, 200 260 L188 262 C182 262, 178 256, 178 248 Z" fill="#F5D5C0" stroke="#E0B89C" stroke-width="1"/>
    <!-- Finger detail -->
    <path d="M184 240 L186 250" stroke="#E0B89C" stroke-width="0.8"/>
    <path d="M190 240 L191 250" stroke="#E0B89C" stroke-width="0.8"/>
  </g>

  <!-- Ear (left, partially hidden) -->
  <ellipse cx="110" cy="212" rx="5" ry="10" fill="#F5D5C0"/>
</svg>